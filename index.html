<!DOCTYPE html>
<html>
<head>
    <title>AI Automation Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Automation Assistant</h1>

    <div class="input-box">
        <input id="commandInput" placeholder="Enter command...">
        <button onclick="runCommand()">Run</button>
    </div>

    <div class="input-box">
        <input id="scheduleTime" placeholder="Seconds (e.g. 60)">
        <button onclick="scheduleTask()">Schedule</button>
    </div>

    <div class="input-box">
        <input id="watchPath" placeholder="Folder path to watch">
        <button onclick="startWatcher()">Watch Folder</button>
    </div>

    <h3>Result</h3>
    <pre id="result"></pre>

    <h3>History</h3>
    <ul id="history"></ul>
</div>

<script>
async function runCommand() {
    const cmd = document.getElementById("commandInput").value;

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({command: cmd})
    });

    const data = await res.json();
    document.getElementById("result").textContent = data.result;
    loadHistory();
}

async function scheduleTask() {
    const cmd = document.getElementById("commandInput").value;
    const seconds = document.getElementById("scheduleTime").value;

    await fetch("/schedule", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({command: cmd, seconds: seconds})
    });

    alert("Scheduled!");
}

async function startWatcher() {
    const path = document.getElementById("watchPath").value;
    const cmd = document.getElementById("commandInput").value;

    await fetch("/watch", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({path: path, command: cmd})
    });

    alert("Watching folder!");
}

async function loadHistory() {
    const res = await fetch("/history");
    const data = await res.json();

    const list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item[0] + " → " + item[1];
        list.appendChild(li);
    });
}

loadHistory();
</script>

</body>
</html>
